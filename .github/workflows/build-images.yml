name: Build images

# Reusable multi-arch image build + publish. Each (image, arch) builds once on a
# native runner and pushes by digest; a per-image merge job stitches the digests
# into one manifest and applies the channel's tags. Called by edge.yml (the
# moving `edge` tag) and release.yml (versioned tags) so the build definition
# lives in exactly one place — the callers differ only in which tags they ask
# for. A single QEMU job for both arches exhausted the runner disk on the
# torch-sized backend image, hence native runners + a digest merge.
on:
  workflow_call:
    inputs:
      channel:
        description: "edge (moving `edge` tag) or release (versioned tags)"
        required: true
        type: string
      version:
        description: "SemVer version (X.Y.Z or X.Y.Z-rc.N); required when channel is release"
        required: false
        default: ""
        type: string

jobs:
  build:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: ragworks-backend
            context: .
            dockerfile: Dockerfile.backend
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - image: ragworks-backend
            context: .
            dockerfile: Dockerfile.backend
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: ragworks-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - image: ragworks-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      # The backend's dependency layer (torch et al.) needs more scratch space
      # than a stock runner has free.
      - name: Free runner disk space
        if: matrix.image == 'ragworks-backend'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h /
      - name: Compute lowercase image name
        id: name
        run: echo "image=ghcr.io/${OWNER,,}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ steps.name.outputs.image }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish ${{ matrix.image }} manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [ragworks-backend, ragworks-frontend]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true
      - name: Compute lowercase image name
        id: name
        run: echo "image=ghcr.io/${OWNER,,}/${{ matrix.image }}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
      - name: Compute manifest tags for this channel
        id: tags
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
          IMAGE: ${{ steps.name.outputs.image }}
        run: |
          case "$CHANNEL" in
            edge)
              echo "args=-t $IMAGE:edge" >> "$GITHUB_OUTPUT"
              echo "primary=$IMAGE:edge" >> "$GITHUB_OUTPUT"
              ;;
            release)
              if [ -z "$VERSION" ]; then echo "release channel requires a version"; exit 1; fi
              ARGS="-t $IMAGE:$VERSION"
              case "$VERSION" in
                # Pre-releases (X.Y.Z-rc.N) get only the exact version — never
                # latest or the X.Y series tag.
                *-*) ;;
                *) ARGS="$ARGS -t $IMAGE:${VERSION%.*} -t $IMAGE:latest" ;;
              esac
              echo "args=$ARGS" >> "$GITHUB_OUTPUT"
              echo "primary=$IMAGE:$VERSION" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "unknown channel: $CHANNEL"; exit 1 ;;
          esac
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          # shellcheck disable=SC2046 # word splitting is the point: repeated -t/tag and digest args
          docker buildx imagetools create ${{ steps.tags.outputs.args }} \
            $(printf '${{ steps.name.outputs.image }}@sha256:%s ' *)
      - name: Inspect manifest
        run: docker buildx imagetools inspect "${{ steps.tags.outputs.primary }}"
