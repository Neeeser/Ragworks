name: Release

# Cut when a `release/v*` PR (opened by scripts/bump_version.py) is merged:
# build versioned multi-arch images, tag the merge commit, and create the
# GitHub Release with label-organized notes (.github/release.yml) and
# docker-compose.yml attached. The release commit already passed the verify
# gate on the release PR, so this path never re-runs it — and because the tag
# is created here (not pushed by hand), a failed build leaves no dangling tag.
on:
  pull_request:
    types: [closed]

concurrency:
  # Per release branch, and never cancelled mid-flight — a half-built release
  # must not be interrupted by an unrelated event.
  group: release-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release version
    # Only a merged, same-repo release/v* PR triggers a release.
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - name: Read version from pyproject.toml
        id: v
        run: |
          VERSION=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/^version = "([^"]+)"$/\1/')
          if [ -z "$VERSION" ]; then echo "could not read version from pyproject.toml"; exit 1; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-*) echo "prerelease=true" >> "$GITHUB_OUTPUT" ;;
            *) echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

  build:
    needs: prepare
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      channel: release
      version: ${{ needs.prepare.outputs.version }}

  release:
    name: Tag and publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
      - name: Create and push tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG" "$SHA"
          git push origin "$TAG"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            gh release create "$TAG" --verify-tag --generate-notes --prerelease docker-compose.yml
          else
            gh release create "$TAG" --verify-tag --generate-notes docker-compose.yml
          fi
